# config/config.yaml
app:
  name: "my-first-project"
  version: "0.1.0"
  debug: true

server:
  host: "0.0.0.0"
  port: 8000
  timeout: 30

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s)"

models:
  default: "gpt-3.5-turbo"
  embedding: "text-embedding-3-small"
  temperature: 0.7
  max_tokens: 1000

rag:
  chunk_size: 512
  chunk_overlap: 50
  top_k: 3
  rerank_threshold: 0.7
